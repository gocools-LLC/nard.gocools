name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Artifacts
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/${{ github.event.repository.name }}-linux-amd64 ./cmd/*
          GOOS=darwin GOARCH=arm64 go build -o dist/${{ github.event.repository.name }}-darwin-arm64 ./cmd/*
          GOOS=windows GOARCH=amd64 go build -o dist/${{ github.event.repository.name }}-windows-amd64.exe ./cmd/*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/
